name: IPO Scout Cron Jobs

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  db-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run DB Check
        run: curl -X GET https://ipo-jp.vercel.app/api/cron/db-check -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  edinet-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Run EDINET Scan
        run: curl -X GET https://ipo-jp.vercel.app/api/cron/edinet-scan -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  news-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Run News Fetch
        run: curl -X GET https://ipo-jp.vercel.app/api/cron/news-fetch -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"