name: IPO Scout Cron Jobs

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 10 * * *'
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  db-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run DB Check
        run: "curl -X GET https://ipo-jp.vercel.app/api/cron/db-check -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'"

  edinet-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Run EDINET Scan
        run: "curl -X GET https://ipo-jp.vercel.app/api/cron/edinet-scan -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'"

  news-fetch-with-newsapi:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * *' || github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Run News Fetch with News API
        run: "curl -X GET 'https://ipo-jp.vercel.app/api/cron/news-fetch?newsapi=true' -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'"

  news-fetch-pr-only:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * *'
    steps:
      - name: Run News Fetch PR Times only
        run: "curl -X GET 'https://ipo-jp.vercel.app/api/cron/news-fetch?newsapi=false' -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'"

  detect-ipo-price:
    runs-on: ubuntu-latest
    steps:
      - name: Run Detect IPO Price
        run: "curl -X GET https://ipo-jp.vercel.app/api/cron/detect-ipo-price -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'"

  daily-reminder:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Run Daily Reminder
        run: "curl -X GET https://ipo-jp.vercel.app/api/cron/daily-reminder -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'"